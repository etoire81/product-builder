<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Dinner Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="lotto">Lotto Numbers</button>
            <button class="tab-btn" data-tab="menu">Dinner Menu</button>
        </div>

        <div id="lotto-section" class="tab-content active">
            <h1>Lotto Generator</h1>
            <div id="lotto-numbers" class="lotto-numbers"></div>
            <button id="generate-btn" class="main-btn">Generate Numbers</button>
        </div>

        <div id="menu-section" class="tab-content">
            <h1>What's for Dinner?</h1>
            <div id="menu-display" class="menu-display">Ready for a recommendation?</div>
            <button id="recommend-btn" class="main-btn">Recommend Menu</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
